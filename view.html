<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Unlocked!</title>
    <style>
        /* Import a clean, modern font from Google */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
            /* A beautiful purple/blue gradient background */
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }

        .message-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            max-width: 90%;
            width: 400px;
            text-align: center;
            /* A smooth pop-in animation when the page loads */
            animation: popIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
            transform: scale(0.8);
            opacity: 0;
        }

        @keyframes popIn {
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .icon {
            font-size: 50px;
            margin-bottom: 10px;
            display: block;
            /* A gentle floating animation for the icon */
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        h1 {
            color: #2d3748;
            font-size: 26px;
            margin-top: 0;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .the-message {
            background: #edf2f7;
            padding: 20px;
            border-radius: 12px;
            font-size: 20px;
            line-height: 1.5;
            color: #4a5568;
            word-wrap: break-word;
            margin: 25px 0;
            border-left: 6px solid #667eea;
            text-align: left;
        }

        .btn {
            display: inline-block;
            margin-top: 10px;
            padding: 12px 25px;
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(118, 75, 162, 0.4);
        }
    </style>
</head>
<body>

    <div class="message-container">
        <span class="icon">✨</span>
        <h1>Message Unlocked!</h1>
        
        <div class="the-message">
            {{ message }}
        </div>

        <p style="font-size: 14px; color: #a0aec0; margin-bottom: 20px;">Scanned successfully</p>
        
        <a href="/" class="btn">Create Your Own QR Code</a>
    </div>

</body>
</html>
